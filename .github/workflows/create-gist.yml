name: Create GitHub Gist

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-gist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Build the JSON payload for the Gist using file contents as strings
          PAYLOAD=$(jq -n \
            --rawfile pkg package.json \
            --rawfile vite vite.config.js \
            --rawfile tailwind tailwind.config.js \
            '{
              description: "Foodela - Food Delivery App key configuration files",
              public: true,
              files: {
                "package.json": { content: $pkg },
                "vite.config.js": { content: $vite },
                "tailwind.config.js": { content: $tailwind }
              }
            }')

          # Create a new Gist via the GitHub API
          HTTP_STATUS=$(curl -s -o /tmp/gist_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" -eq 201 ]; then
            GIST_URL=$(jq -r '.html_url' /tmp/gist_response.json)
            echo "Gist created successfully: $GIST_URL"
          else
            echo "Failed to create Gist. HTTP status: $HTTP_STATUS"
            jq '.' /tmp/gist_response.json
            exit 1
          fi
